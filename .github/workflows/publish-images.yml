name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    name: Verify release build inputs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run backend tests
        run: ./gradlew test --no-daemon

      - name: Generate scoring benchmark report
        run: ./gradlew scoringBenchmarkReport --no-daemon

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload scoring benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: scoring-benchmark-report
          path: build/reports/scoring-benchmark/report.md
          if-no-files-found: error

  publish:
    name: Build and publish multi-arch images
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: ghcr.io/jinmo100/essay-evaluator-backend
            context: .
            file: ./Dockerfile.backend
          - component: frontend
            image: ghcr.io/jinmo100/essay-evaluator-frontend
            context: ./frontend
            file: ./Dockerfile.frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Essay Evaluator ${{ matrix.component }} release image

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  publicize:
    name: Best-effort public GHCR visibility
    runs-on: ubuntu-latest
    needs: publish
    if: github.repository_owner == 'jinmo100'
    steps:
      - name: Mark packages public when the API permits it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH /user/packages/container/essay-evaluator-backend/visibility -f visibility=public || true
          gh api --method PATCH /user/packages/container/essay-evaluator-frontend/visibility -f visibility=public || true
