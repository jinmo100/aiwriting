spring:
  datasource:
    url: jdbc:h2:mem:aiwriting_dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  # MyBatis-Plus配置 (开发环境)
  mybatis-plus:
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto

  # H2控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA已弃用，使用MyBatis-Plus
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

logging:
  level:
    com.jinmo.aiwriting: DEBUG
    dev.langchain4j: DEBUG
    org.apache.ibatis: DEBUG
