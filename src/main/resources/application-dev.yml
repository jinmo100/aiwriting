spring:
  datasource:
    # 默认连接本机 PostgreSQL。若通过 SSH 隧道访问远端数据库，请在 .env.dev.local 中覆盖 DEV_DB_HOST/DEV_DB_PORT。
    url: jdbc:postgresql://${DEV_DB_HOST:localhost}:${DEV_DB_PORT:5432}/${DEV_DB_NAME:aiwriting}
    username: ${DEV_DB_USER:aiwriting}
    password: ${DEV_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  data:
    redis:
      # 默认连接本机 Redis。带密码或远端连接请通过 DEV_REDIS_URL 覆盖。
      url: ${DEV_REDIS_URL:redis://localhost:6379/0}

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.jinmo.aiwriting: DEBUG
    dev.langchain4j: DEBUG
    org.apache.ibatis: WARN

aiwriting:
  security:
    encryption-key: ${AIWRITING_SECRET_KEY:dev-only-aiwriting-secret-change-me}
    allow-api-key-reveal: true
