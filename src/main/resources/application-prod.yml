spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:essay_evaluator}
    username: ${DB_USER:essay_evaluator}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379/0}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  servlet:
    session:
      cookie:
        secure: ${ESSAY_EVALUATOR_SESSION_COOKIE_SECURE:true}

logging:
  level:
    root: INFO
    com.jinmo.essayevaluator: INFO
    dev.langchain4j: INFO

essay-evaluator:
  security:
    encryption-key: ${ESSAY_EVALUATOR_SECRET_KEY}
  auth:
    registration-enabled: ${ESSAY_EVALUATOR_REGISTRATION_ENABLED:true}
