version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiwriting-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiwriting}
      POSTGRES_USER: ${POSTGRES_USER:-aiwriting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - aiwriting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwriting}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: aiwriting-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-aiwriting}
      DB_USER: ${POSTGRES_USER:-aiwriting}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AIWRITING_SECRET_KEY: ${AIWRITING_SECRET_KEY:?Set AIWRITING_SECRET_KEY in .env}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - aiwriting-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aiwriting-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - aiwriting-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: aiwriting-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - aiwriting-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  aiwriting-network:
    driver: bridge
